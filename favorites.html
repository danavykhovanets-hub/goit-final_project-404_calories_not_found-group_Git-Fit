  <body>
    <header></header>
    <main></main>
    <footer></footer>

    <div class="loader" id="loader">
      <span class="loader__spinner"></span>
    </div>

    <!-- Modal window -->
    <div class="overlay" hidden>
  <div class="modal">
    <!-- Close button -->
    <button class="modal_close" type="button" data-modal-close>
      <svg class="modal_close_icon" width="24" height="24">
        <use href="/goit-advancedjs-finalproject-group_4/assets/icons-DwKFMiRG.svg#discard_sign"></use>
      </svg>
    </button>

    <!-- Ancor for the modar data rendering -->
    <div class="modal_content">
      <!-- TODO:Remove this code -->
      <form class="modal_rating">
        <h2 class="modal_rating_title">Rating</h2>
        <div class="modal_rating_star_raiting_container">
          <p class="modal_rating_star_rating_number">0.0</p>
          <select class="star-rating">
            <option value="">Select a rating</option>
            <option value="5">Excellent</option>
            <option value="4">Very Good</option>
            <option value="3">Average</option>
            <option value="2">Poor</option>
            <option value="1">Terrible</option>
          </select>
        </div>
        <input
          class="modal_rating_input"
          type="email"
          name="email"
          placeholder="Email"
          pattern="^\w+(.\w+)?@[a-zA-Z_]+?.[a-zA-Z]{2,3}$"
        />
        <textarea
          class="modal_rating_textarea"
          name="comment"
          placeholder="Your comment"
        ></textarea>
        <button class="modal_rating_submit" type="submit">Send</button>
      </form>
    </div>
  </div>
</div>


    <!-- Scripts -->
    <script src="js/star-rating.min.js"></script>
  </body>
